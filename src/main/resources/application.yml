spring:
  application:
    name: online-store
  mvc:
    hiddenmethod:
      filter:
        enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/onlineStore?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false
    username: root
    password: 12345

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

remita:
  merchantId: ${merchantId}
  apiKey: ${apiKey}
  serviceTypeId: ${serviceTypeId}
  baseUrl: ${baseUrl}
  publicKey: ${publicKey}
  secretKey: ${secretKey}

server:
  port: 0