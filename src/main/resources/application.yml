spring:
  application:
    name: online-store
  mvc:
    hiddenmethod:
      filter:
        enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/onlineStore?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false
    username: root
    password: 12345

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

flutterwave:
  public-key: ${publicKey}
  secret-key: ${secretKey}
  base-url: ${baseUrl}
