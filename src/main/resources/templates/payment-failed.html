<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Failed Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100 bg-light">
    <div class="card border-0 shadow-sm text-center p-5" style="max-width: 500px; width: 100%;">

        <!-- Failed Icon -->
        <div class="mb-4">
            <div class="rounded-circle bg-danger d-inline-flex justify-content-center align-items-center"
                 style="width: 90px; height: 90px;">
                <i class="bi bi-x-lg text-white fs-1"></i>
            </div>
        </div>

        <h2 class="fw-bold text-danger mb-3">Payment Failed!</h2>

        <p class="text-muted fs-5 mb-4">
            Your transaction could not be completed. Please try again.
        </p>

        <div class="d-inline-flex align-items-center justify-content-center border rounded px-3 py-2 bg-white mx-auto">
            <i class="bi bi-lock-fill text-warning me-2"></i>
            <small class="text-uppercase fw-semibold text-secondary">
                Secured by Flutterwave
            </small>
        </div>

        <!-- Action Buttons -->
        <div class="mt-4 d-flex justify-content-center gap-3">
            <a th:href="@{/checkout}" class="btn btn-danger px-4">
                Try Again
            </a>
            <a th;href="@{/dashboard}" class="btn btn-outline-secondary px-4">
                Back to Dashboard
            </a>
        </div>
    </div>
</div>
</body>
</html>
