<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-warning">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/}">Dashboard</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Action
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Login</a></li>
                        <li><a class="dropdown-item" href="#">Logout</a></li>
                    </ul>
                </li>
            </ul>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>
<br>
<br>
<div class="container">
    <div class="row">
        <div class="col-lg-6 col-sm-6 container justify-content-center card mt-5">
            <h3 class="text-center text-warning mt-3">Add Product</h3>
            <div class="card-body">
                <form class="row g-3 needs-validation" th:action="@{/add_product}" th:object="${productDto}" method="post" novalidate>
                    <div class="col-md-6">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" th:field="*{title}" class="form-control" id="title" required>
                        <div class="invalid-feedback">
                            Please provide a title.
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="price" class="form-label">Price</label>
                        <input type="text" th:field="*{price}" class="form-control" id="price" required>
                        <div class="invalid-feedback">
                            Please provide a price.
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="description" class="form-label">Description</label>
                        <input type="text" th:field="*{description}" class="form-control" id="description" required>
                        <div class="invalid-feedback">
                            Please provide a description.
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="category" class="form-label">Category</label>
                        <input type="text" th:field="*{category}" class="form-control" id="category" required>
                        <div class="invalid-feedback">
                            Please provide a category.
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="image" class="form-label">image</label>
                        <input type="text" th:field="*{image}" class="form-control" id="image" required>
                        <div class="invalid-feedback">
                            Please provide an image.
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="rating" class="form-label">Rating</label>
                        <input type="text" th:field="*{rating}" class="form-control" id="rating" required>
                        <div class="invalid-feedback">
                            Please provide a rating.
                        </div>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-warning">Submit</button>
                    </div>
                </form>

                <div th:if="${param.success}">
                    <p style="color:green;">Product created successfully!</p>
                </div>

                <div th:if="${param.error}">
                    <p style="color:red;">Error creating product!</p>
                </div>
            </div>
        </div>
    </div>
</div>



</body>
</html>
