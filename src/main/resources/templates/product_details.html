<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-warning">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Online Store</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Action
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/login}">Login</a></li>
                        <li><a class="dropdown-item" th:href="@{/logout}">Logout</a></li>
                        <li><a class="dropdown-item" th:href="@{/register}">register</a></li>

                    </ul>
                </li>
            </ul>
            <form th:action="@{/dashboard}" class="d-flex" role="search">
                <input class="form-control me-2" name="keyword" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="row custom-height">

        <!-- LEFT SIDE -->
        <div class="col-md-9">
            <div class="row" th:object="${product}">

                <!-- IMAGE CARD -->
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        <img th:src="${product.image}" class="card-img-top" alt="Product Image">
                        <div class="card-body text-center">

                            <form th:action="@{/product/delete/{id}(id=${product.id})}" method="post">
                                <input type="hidden" name="_method" value="delete" />
                                <button class="btn btn-danger mb-2" type="submit">Delete</button>
                            </form>

                            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                                <button class="btn btn-warning" type="submit">Add to cart</button>
                            </form>

                        </div>
                    </div>
                </div>

                <!-- DETAILS CARD -->
                <div class="col-md-8 mb-4">
                    <div class="card h-100">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item fw-bold" th:text="${product.title}"></li>
                            <li class="list-group-item text-success fw-bold" th:text="${product.price}"></li>
                            <li class="list-group-item" th:text="${product.description}"></li>
                            <li class="list-group-item" th:text="${product.category}"></li>
                            <li class="list-group-item" th:text="${product.rating}"></li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>

        <!-- RIGHT SIDE (CATEGORIES) -->
        <div class="col-md-3">
            <div class="card h-100">
                <ul class="list-group list-group-flush h-100">
                    <li class="list-group-item">Appliances</li>
                    <li class="list-group-item">Phones & Tablets</li>
                    <li class="list-group-item">Health & Beauty</li>
                    <li class="list-group-item">Home & Office</li>
                    <li class="list-group-item">Electronics</li>
                    <li class="list-group-item">Supermarket</li>
                    <li class="list-group-item">Computing</li>
                    <li class="list-group-item">Baby products</li>
                    <li class="list-group-item">Gaming</li>
                    <li class="list-group-item">Other categories</li>
                </ul>
            </div>
        </div>

    </div>
</div>
</body>
</html>
