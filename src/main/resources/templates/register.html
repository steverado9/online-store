<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        body {
           font-family: 'Poppins', sans-serif;
       }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-warning">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/dashboard}">Dashboard</a>
                </li>
            </ul>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>
<br>
<br>
<div class="container">
    <div class="row">
        <div class="col-lg-6 col-sm-6 container justify-content-center card mt-5">
            <h3 class="text-center text-warning mt-3">Register</h3>
            <div class="card-body">
                <form class="row g-3 needs-validation" th:action="@{/register}" th:object="${userDto}" method="post" novalidate>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" id="email" required>
                        <div class="invalid-feedback">
                            Please provide an email.
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label for="password" class="form-label">Password</label>
                        <input type="text" th:field="*{password}" class="form-control" id="Password" required>
                        <div class="invalid-feedback">
                            Please provide a password.
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="firstName" class="form-label">firstName</label>
                        <input type="text" th:field="*{firstName}" class="form-control" id="firstName" required>
                        <div class="invalid-feedback">
                            Please provide a firstName.
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="lastName" class="form-label">lastName</label>
                        <input type="text" th:field="*{lastName}" class="form-control" id="lastName" required>
                        <div class="invalid-feedback">
                            Please provide a lastName.
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="phoneNumber" class="form-label">Phone number</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control" id="phoneNumber" required>
                        <div class="invalid-feedback">
                            Please provide a phoneNumber.
                        </div>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-warning">Submit</button>
                    </div>
                </form>

                <div th:if="${param.success}">
                    <p style="color:green;">User created successfully!</p>
                </div>

                <div th:if="${error}">
                    <p th:text="${error}" style="color:red;"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (() => {
      'use strict'

      // Fetch all the forms we want to apply custom Bootstrap validation styles to
      const forms = document.querySelectorAll('.needs-validation')

      // Loop over them and prevent submission
      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
          }

          form.classList.add('was-validated')
        }, false)
      })
    })()
</script>
</body>
</html>
