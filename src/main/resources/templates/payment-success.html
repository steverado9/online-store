<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<!-- Payment Success Message -->
<div class="container d-flex justify-content-center align-items-center min-vh-100 bg-light">
    <div class="card border-0 shadow-sm text-center p-5" style="max-width: 500px; width: 100%;">

        <!-- Success Icon -->
        <div class="mb-4">
            <div class="rounded-circle bg-success d-inline-flex justify-content-center align-items-center"
                 style="width: 90px; height: 90px;">
                <i class="bi bi-check-lg text-white fs-1"></i>
            </div>
        </div>

        <h2 class="fw-bold text-warning mb-3">Thanks for your payment!</h2>

        <p class="text-muted fs-5 mb-4">
            Your transaction was completed successfully.
        </p>

        <!-- Security Badge -->
        <div class="d-inline-flex align-items-center justify-content-center border rounded px-3 py-2 bg-white mx-auto">
            <i class="bi bi-lock-fill text-warning me-2"></i>
            <small class="text-uppercase fw-semibold text-secondary">
                Secured by Flutterwave
            </small>
        </div>

        <div class="mt-4">
            <a th:href="@{/dashboard}" class="btn btn-warning px-4">
                Continue Shopping
            </a>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
