<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="">
<nav class="navbar navbar-expand-lg bg-warning">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Online Store</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link " th:href="@{/add_product}">Add product</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Action
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/login}">Login</a></li>
                        <li><a class="dropdown-item" th:href="@{/logout}">Logout</a></li>
                        <li><a class="dropdown-item" th:href="@{/register}">register</a></li>

                    </ul>
                </li>
            </ul>
            <form th:action="@{/dashboard}" class="d-flex" role="search">
                <input class="form-control me-2" name="keyword" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>
<br>
<br>
<div class="container mt-4">
    <div class="row align-items-stretch custom-height">

        <!-- LEFT: CARD -->
        <div class="col-md-3">
            <div class="card h-100">
                <ul class="list-group list-group-flush h-100">
                    <li class="list-group-item">Appliances</li>
                    <li class="list-group-item">Phones & Tablets</li>
                    <li class="list-group-item">Health & Beauty</li>
                    <li class="list-group-item">Home & Office</li>
                    <li class="list-group-item">Electronics</li>
                    <li class="list-group-item">Supermarket</li>
                    <li class="list-group-item">Computing</li>
                    <li class="list-group-item">Baby products</li>
                    <li class="list-group-item">Gaming</li>
                    <li class="list-group-item">Other categories</li>
                </ul>
            </div>
        </div>

        <!-- RIGHT: CAROUSEL -->
        <div class="col-md-9">
            <div id="carouselExampleAutoplaying" class="carousel slide h-100" data-bs-ride="carousel">
                <div class="carousel-inner h-100">

                    <div class="carousel-item active h-100">
                        <img th:src="@{images/first.jpg}" class="d-block w-100 h-100 object-fit-cover" alt="...">
                    </div>

                    <div class="carousel-item h-100">
                        <img th:src="@{images/second.jpg}" class="d-block w-100 h-100 object-fit-cover" alt="...">
                    </div>

                    <div class="carousel-item h-100">
                        <img th:src="@{images/third.jpg}" class="d-block w-100 h-100 object-fit-cover" alt="...">
                    </div>
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>

    </div>
</div>
<br>
<br>
<div class="container">
    <div class="row">
        <div class="col-md-3 mb-4" th:each="product : ${products}">
            <div class="card h-100">
                <img th:src="${product.image}" class="card-img-top" alt="Product Image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.title}"></h5>
                    <p class="card-text fw-bold" th:text="${product.price}"></p>
                    <p class="card-text" th:text="${product.description}"></p>
                    <p class="card-text" th:text="${product.category}"></p>
                    <p class="card-text" th:text="${product.rating}"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
