<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>My cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-warning">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Online Store</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link " th:href="@{/add_product}">Add product</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link " th:href="@{/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Action
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/login}">Login</a></li>
                        <li><a class="dropdown-item" th:href="@{/logout}">Logout</a></li>
                        <li><a class="dropdown-item" th:href="@{/register}">register</a></li>

                    </ul>
                </li>
            </ul>
            <form th:action="@{/dashboard}" class="d-flex" role="search">
                <input class="form-control me-2" name="keyword" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <p th:if="${#lists.isEmpty(items)}" style="color:gray;">
            Your cart is empty.
        </p>

        <!-- CART ITEMS -->
        <div class="col-lg-8">
            <div class="card p-3 mb-3" th:each="item : ${items}">

                <div class="row align-items-center">

                    <!-- Image -->
                    <div class="col-md-2">
                        <img th:src="${item.product.image}" class="img-fluid" alt="">
                    </div>

                    <!-- Details -->
                    <div class="col-md-6">
                        <h6 th:text="${item.product.title}"></h6>
                        <small class="text-muted">Few units left</small>
                        <br>
                        <form th:action="@{/cart/delete/{id}(id=${item.id})}" method="post" class="delete-form">
                            <input type="hidden" name="_method" value="delete" />
                            <button type="submit" class="btn text-danger">Remove</button>
                        </form>

                    </div>

                    <!-- Quantity -->
                    <div class="col-md-2 text-center">
                        <div class="d-flex justify-content-center align-items-center">
                            <form th:action="@{/cart/decrease/{id}(id=${item.id})}" method="post" style="display:inline;">
                                <button class="btn btn-light">-</button>
                            </form>
                            <span class="mx-2" th:text="${item.quantity}"></span>
                            <form th:action="@{/cart/increase/{id}(id=${item.id})}" method="post" style="display:inline;">
                                <button class="btn btn-warning">+</button>
                            </form>
                        </div>
                    </div>

                    <!-- Price -->
                    <div class="col-md-2 text-end">
                        <strong th:text="${item.product.price}"></strong>
                    </div>

                </div>

            </div>
        </div>


        <!-- CART SUMMARY -->
        <div class="col-lg-4">
            <div class="card p-3 sticky-top" style="top: 20px;">

                <h5>Cart Summary</h5>
                <hr>

                <div class="d-flex justify-content-between">
                    <span>Subtotal</span>
                    <h3>Total :&#8358;<strong th:text="${#numbers.formatDecimal(total, 1, 2)}"></strong></h3>
                </div>

                <button class="btn btn-warning w-100 mt-3">
                    Checkout
                </button>

            </div>
        </div>

    </div>
</div>











<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
    document.querySelectorAll(".delete-form").forEach(form => {
        form.addEventListener("submit", function(event) {
            event.preventDefault();

            Swal.fire({
                title: "Are you sure?",
                text: "This action cannot be undone!",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#d33",
                cancelButtonColor: "#3085d6",
                confirmButtonText: "Yes, delete it!"
            }).then((result) => {
                if (result.isConfirmed) {
                    form.submit();
                }
            });
        });
    });
</script>
</body>
</html>
